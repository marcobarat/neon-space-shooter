name: Notifica Telegram

# Manda un messaggio Telegram a ogni push su main (con esito dei test) e a ogni release.
# Il token del bot NON è nel codice: sta nei GitHub Secrets del repo
#   TELEGRAM_BOT_TOKEN  (obbligatorio)
#   TELEGRAM_CHAT_ID    (obbligatorio)
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch: # test manuale on-demand (Actions → Run workflow / gh workflow run)

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Esegui i test
        id: test
        run: npm test
        continue-on-error: true
      - name: Invia messaggio Telegram
        # Tutti gli input non fidati passano da env (mai interpolati nello script):
        # così restano DATI e non possono iniettare comandi shell.
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT: ${{ github.event_name }}
          REL_TAG: ${{ github.event.release.tag_name }}
          REL_NAME: ${{ github.event.release.name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          TEST_RES: ${{ steps.test.outcome }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHAT" ]; then
            echo "::error::Secrets Telegram mancanti (TELEGRAM_BOT_TOKEN e/o TELEGRAM_CHAT_ID). Impostali in Settings → Secrets → Actions."
            exit 1
          fi
          if [ "$EVENT" = "release" ]; then
            MSG="🚀 Neon Space Shooter — nuova release ${REL_TAG}"$'\n'"${REL_NAME}"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            MSG="🔔 Neon Space Shooter — test notifiche"$'\n'"Se leggi questo, il bot funziona."
          else
            EMO="✅"; [ "$TEST_RES" != "success" ] && EMO="❌"
            MSG="${EMO} Neon Space Shooter — push su main"$'\n'"test: ${TEST_RES}"$'\n'"${COMMIT_MSG}"
          fi
          # Fail-loud: controlla la risposta di Telegram, non fidarti dell'exit di curl.
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${MSG}")
          if echo "$RESP" | grep -q '"ok":true'; then
            echo "Messaggio Telegram inviato ✔"
          else
            # Non stampiamo l'intera risposta (potrebbe riflettere parti del token in URL d'errore).
            echo "::error::Telegram ha rifiutato l'invio. Controlla TELEGRAM_BOT_TOKEN e TELEGRAM_CHAT_ID."
            echo "$RESP" | grep -o '"error_code":[0-9]*\|"description":"[^"]*"' || true
            exit 1
          fi
