<!DOCTYPE html><html><body style="background:#111">
<canvas id="c" width="430" height="560"></canvas>
<script type="module">
import { drawCreature } from "./js/bestiary/index.js";
import { WORLDS } from "./js/worlds.js";
const ctx = document.getElementById("c").getContext("2d");
ctx.fillStyle = "#0d0a18"; ctx.fillRect(0,0,430,560);
const mk = (type, x, y, skin, color, r) => ({ type, x, y, skin, color, r, t: 1.3, hitFlash: 0, fireTimer: 0.4, aiming: 0, aimDir: Math.PI/2, rot: 0.4, speed: 100 });
const R = { straight:15, zigzag:15, shooter:15, tank:22, kamikaze:14, splitter:16, splitling:9, sniper:15, mine:13, asteroid:24, shard:13, pebble:8 };
try {
  WORLDS.forEach((w, wi) => {
    const types = [...w.pool];
    if (w.pool.includes("splitter")) types.push("splitling");
    if (w.pool.includes("asteroid")) types.push("shard","pebble");
    types.forEach((type, i) => {
      const col = w.enemy[type] || w.enemy[type==="splitling"?"splitter":"asteroid"];
      drawCreature(ctx, mk(type, 45 + i*55, 60 + wi*105, wi, col, R[type]));
    });
  });
  document.title = "OK";
} catch (err) { console.error("BESTIARY ERR", err.message, err.stack); }
</script></body></html>
